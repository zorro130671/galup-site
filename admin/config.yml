backend:
  name: git-gateway
  branch: master

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "homepage"
    label: "Home Page"
    files:
      - name: "content"
        label: "Page Content"
        file: "_data/content.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Main Headline", name: "headline", widget: "string" }
              - { label: "Highlighted Phrase", name: "headline_em", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }

          - label: "Stats Bar"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Community Programs", name: "programs", widget: "number", value_type: "int" }
              - { label: "Corporate Partners", name: "partners", widget: "number", value_type: "int" }
              - { label: "Individual Donors", name: "donors", widget: "number", value_type: "int" }
              - { label: "Team Members", name: "team", widget: "number", value_type: "int" }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph 1", name: "p1", widget: "text" }
              - { label: "Paragraph 2", name: "p2", widget: "text" }
              - { label: "Paragraph 3", name: "p3", widget: "text" }

          - label: "Vision & Mission"
            name: "visionmission"
            widget: "object"
            fields:
              - { label: "Vision Text", name: "vision", widget: "text" }
              - { label: "Mission Text", name: "mission", widget: "text" }
